<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[P研] 倉庫スケジュール</title>

    <!-- React + ReactDOM (UMD) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (JSX をブラウザで変換) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase (ESM → importmap 経由) -->
    <script type="importmap">
    {
        "imports": {
        "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js":      "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js": "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"
        }
    }
    </script>

    <link rel="stylesheet" href="style.css">
    <style>
        html, body, #root { height: 100%; margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" src="script.js"></script>
</body>
</html>
